<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 종합소득세 신고 안내</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .slide-enter { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 아이콘 SVG 컴포넌트
        const Icons = {
            ChevronLeft: () => (
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            ),
            ChevronRight: () => (
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            ),
            CheckCircle: () => (
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            ),
            Heart: () => (
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            ),
            Baby: () => (
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></svg>
            ),
            Wallet: () => (
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
            ),
            Phone: () => (
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            ),
            ArrowRight: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            )
        };

        const CardNews = () => {
            const [currentSlide, setCurrentSlide] = useState(0);

            const slides = [
                {
                    title: "2026년 5월 종합소득세 신고",
                    subtitle: "2025년 귀속분 개정세법 안내",
                    description: "달라진 세법, 미리 알면 세금이 줄어듭니다.\n대한세무법인이 핵심만 꼼꼼히 정리해 드립니다.",
                    type: "intro",
                    icon: <Icons.CheckCircle />,
                    iconColor: "text-yellow-400"
                },
                {
                    title: "결혼세액공제 신설",
                    subtitle: "생애 단 한 번, 부부 합산 100만원 혜택",
                    content: [
                        { label: "대상", value: "2024~2026년 중 혼인신고한 사업자" },
                        { label: "공제액", value: "부부 1인당 50만원 (합산 100만원)" },
                        { label: "기한", value: "생애 1회 적용 가능" }
                    ],
                    type: "feature",
                    icon: <Icons.Heart />,
                    iconColor: "text-rose-400",
                    highlight: "이제 결혼도 중요한 절세 전략입니다!"
                },
                {
                    title: "자녀세액공제 확대",
                    subtitle: "양육 부담을 덜어드리는 10만원 인상",
                    content: [
                        { label: "첫째 자녀", value: "15만원 → 25만원" },
                        { label: "둘째 자녀", value: "20만원 → 30만원" },
                        { label: "셋째 이상", value: "30만원 → 40만원" }
                    ],
                    type: "feature",
                    icon: <Icons.Baby />,
                    iconColor: "text-sky-400",
                    highlight: "자녀 1인당 공제액이 10만원씩 더 늘어났습니다."
                },
                {
                    title: "노란우산공제 한도 상향",
                    subtitle: "2025년 납입분부터 공제 한도 대폭 상향",
                    content: [
                        { label: "4,000만원 이하", value: "최대 500만 → 600만원" },
                        { label: "4,000만 ~ 6,000만원", value: "최대 300만 → 500만원" },
                        { label: "6,000만 ~ 1억원", value: "최대 300만 → 400만원" }
                    ],
                    type: "feature",
                    icon: <Icons.Wallet />,
                    iconColor: "text-yellow-400",
                    highlight: "사장님의 소득 구간에 맞는 한도를 확인하세요!"
                },
                {
                    title: "전문가의 도움이 필요하신가요?",
                    subtitle: "복잡한 세법, 놓치는 혜택 없게",
                    description: "폐업했어도, 담당 세무사가 바뀌었어도\n소중한 인연을 바탕으로 정성껏 상담해 드립니다.",
                    type: "cta",
                    icon: <Icons.Phone />,
                    iconColor: "text-green-400"
                }
            ];

            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slides.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);
            const handleChatLink = () => {
                window.open('http://pf.kakao.com/_ddxbxcu/chat', '_blank');
            };

            const current = slides[currentSlide];

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-slate-200 p-4 text-slate-900 overflow-hidden">
                    <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col min-h-[640px] relative border-[6px] border-slate-900">
                        
                        {/* 헤더 섹션 */}
                        <div className="bg-[#0f172a] p-10 text-white flex flex-col items-center text-center space-y-4">
                            <div className={`p-4 bg-white/5 rounded-full backdrop-blur-sm mb-2 shadow-inner ${current.iconColor}`}>
                                {current.icon}
                            </div>
                            <h1 className="text-2xl font-bold leading-tight tracking-tight">{current.title}</h1>
                            <p className="text-yellow-400 font-bold bg-yellow-400/10 px-3 py-1 rounded-full text-sm">
                                {current.subtitle}
                            </p>
                        </div>

                        {/* 컨텐츠 섹션 */}
                        <div className="flex-1 p-8 flex flex-col justify-center bg-slate-50 slide-enter" key={currentSlide}>
                            {current.type === "intro" || current.type === "cta" ? (
                                <div className="text-center space-y-6">
                                    <p className="text-slate-700 leading-relaxed whitespace-pre-line text-lg font-medium">
                                        {current.description}
                                    </p>
                                    {current.type === "cta" && (
                                        <div className="space-y-3">
                                            <button 
                                                onClick={handleChatLink}
                                                className="w-full py-4 bg-[#1e293b] text-white rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-slate-800 transition-all active:scale-95 shadow-lg"
                                            >
                                                세무 상담 예약하기 <Icons.ArrowRight />
                                            </button>
                                            <p className="text-slate-400 text-xs font-medium">버튼을 누르면 카카오톡 상담창으로 연결됩니다.</p>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="space-y-6">
                                    <div className="space-y-4">
                                        {current.content.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-center border-b border-slate-200 pb-4">
                                                <span className="text-slate-500 font-semibold text-sm">{item.label}</span>
                                                <span className="text-[#0f172a] font-black text-lg">{item.value}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-slate-900 p-5 rounded-2xl text-center shadow-md">
                                        <p className="text-sm font-bold text-yellow-400">{current.highlight}</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 네비게이션 버튼 섹션 */}
                        <div className="bg-white px-8 py-6 flex justify-between items-center border-t border-slate-100">
                            <button 
                                onClick={prevSlide} 
                                className="p-3 rounded-full hover:bg-slate-100 text-slate-400 active:scale-90 transition-all"
                                aria-label="이전"
                            >
                                <Icons.ChevronLeft />
                            </button>
                            
                            <div className="flex gap-2.5">
                                {slides.map((_, idx) => (
                                    <div key={idx} className={`h-2 rounded-full transition-all duration-500 ${idx === currentSlide ? 'bg-[#0f172a] w-8' : 'bg-slate-200 w-2'}`} />
                                ))}
                            </div>

                            <button 
                                onClick={nextSlide} 
                                className="p-3 rounded-full hover:bg-slate-100 text-[#0f172a] active:scale-90 transition-all"
                                aria-label="다음"
                            >
                                <Icons.ChevronRight />
                            </button>
                        </div>
                    </div>
                    
                    <div className="mt-8 text-center space-y-1">
                        <p className="text-slate-500 text-sm font-semibold tracking-widest uppercase">Tax Professional Guide</p>
                        <p className="text-slate-400 text-xs">© 2026 종합소득세 신고 안내 • 2025년 귀속분 적용</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CardNews />);
    </script>
</body>
</html>
